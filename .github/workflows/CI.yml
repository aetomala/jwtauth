name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck (library)
        run: govulncheck ./pkg/...

      - name: govulncheck (examples — non-blocking)
        continue-on-error: true
        run: govulncheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install Ginkgo CLI
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.27.3

      - name: Build
        run: go build ./...

      - name: Unit tests (race + coverage)
        run: |
          ginkgo -r \
            --race \
            --cover \
            --coverprofile=coverage.out \
            --covermode=atomic \
            --coverpkg=./... \
            --randomize-all \
            --fail-on-pending \
            --skip-package=integration \
            pkg/keys pkg/tokens pkg/storage pkg/logging pkg/metrics pkg/tracing

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
          retention-days: 14

      - name: Integration tests — disk + memory + Redis distributed (miniredis)
        run: |
          ginkgo -r \
            --race \
            --timeout=180s \
            --randomize-all \
            --fail-on-pending \
            --tags=integration \
            ./pkg/tokens/integration/...
